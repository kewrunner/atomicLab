---
- name: Fix Atomic Lab user access for AAP automation
  hosts: all
  gather_facts: false
  become: true
  become_user: root
  ignore_unreachable: true

  vars:
    lab_users:
      - _aapautomate
      - freddygonzalez

    lab_password: "W3lc0m32026!"

    sshd_main_config: /etc/ssh/sshd_config

  pre_tasks:
    - name: Confirm become is actually root
      ansible.builtin.raw: id -u
      register: become_uid_check
      changed_when: false
      failed_when: become_uid_check.stdout | trim != "0"

    - name: Show become validation
      ansible.builtin.debug:
        msg: "Connected to {{ inventory_hostname }} and become UID is {{ become_uid_check.stdout | trim }}"

  tasks:
    - name: Ensure required local groups exist where applicable
      ansible.builtin.raw: |
        set -e

        if grep -qiE 'ubuntu|debian' /etc/os-release 2>/dev/null; then
          getent group sudo >/dev/null 2>&1 || groupadd sudo
        fi

        if grep -qiE 'rhel|centos|red hat|rocky|almalinux|sles|suse|opensuse' /etc/os-release 2>/dev/null; then
          getent group wheel >/dev/null 2>&1 || groupadd wheel
        fi
      changed_when: false

    - name: Create users if missing, unlock accounts, set password, and disable expiration
      ansible.builtin.raw: |
        set -e

        for u in {{ lab_users | join(' ') }}; do
          if ! id "$u" >/dev/null 2>&1; then
            useradd -m -s /bin/bash "$u"
          fi

          echo "$u:{{ lab_password }}" | chpasswd

          passwd -u "$u" >/dev/null 2>&1 || true
          chage -E -1 "$u" >/dev/null 2>&1 || true
          chage -M 99999 "$u" >/dev/null 2>&1 || true
          chage -m 0 "$u" >/dev/null 2>&1 || true
          chage -I -1 "$u" >/dev/null 2>&1 || true

          if grep -qiE 'ubuntu|debian' /etc/os-release 2>/dev/null; then
            usermod -aG sudo "$u" || true
          fi

          if grep -qiE 'rhel|centos|red hat|rocky|almalinux|sles|suse|opensuse' /etc/os-release 2>/dev/null; then
            usermod -aG wheel "$u" || true
          fi
        done
      no_log: true

    - name: Configure sudoers for passwordless automation access
      ansible.builtin.raw: |
        set -e

        mkdir -p /etc/sudoers.d
        chmod 0750 /etc/sudoers.d || true

        cat > /etc/sudoers.d/90-atomiclab-aap-users <<'EOF'
_aapautomate ALL=(ALL) NOPASSWD: ALL
freddygonzalez ALL=(ALL) NOPASSWD: ALL
EOF

        chmod 0440 /etc/sudoers.d/90-atomiclab-aap-users

        if command -v visudo >/dev/null 2>&1; then
          visudo -cf /etc/sudoers.d/90-atomiclab-aap-users
        fi
      changed_when: true

    - name: Ensure SSH password authentication is enabled
      ansible.builtin.raw: |
        set -e

        cp -p {{ sshd_main_config }} {{ sshd_main_config }}.bak.$(date +%F-%H%M%S)

        if grep -qE '^[#[:space:]]*PasswordAuthentication' {{ sshd_main_config }}; then
          sed -i 's/^[#[:space:]]*PasswordAuthentication.*/PasswordAuthentication yes/' {{ sshd_main_config }}
        else
          echo 'PasswordAuthentication yes' >> {{ sshd_main_config }}
        fi

        if grep -qE '^[#[:space:]]*PubkeyAuthentication' {{ sshd_main_config }}; then
          sed -i 's/^[#[:space:]]*PubkeyAuthentication.*/PubkeyAuthentication yes/' {{ sshd_main_config }}
        else
          echo 'PubkeyAuthentication yes' >> {{ sshd_main_config }}
        fi

        if grep -qE '^[#[:space:]]*KbdInteractiveAuthentication' {{ sshd_main_config }}; then
          sed -i 's/^[#[:space:]]*KbdInteractiveAuthentication.*/KbdInteractiveAuthentication yes/' {{ sshd_main_config }}
        else
          echo 'KbdInteractiveAuthentication yes' >> {{ sshd_main_config }}
        fi

        if grep -qE '^[#[:space:]]*ChallengeResponseAuthentication' {{ sshd_main_config }}; then
          sed -i 's/^[#[:space:]]*ChallengeResponseAuthentication.*/ChallengeResponseAuthentication yes/' {{ sshd_main_config }}
        else
          echo 'ChallengeResponseAuthentication yes' >> {{ sshd_main_config }}
        fi

        if grep -qE '^[#[:space:]]*UsePAM' {{ sshd_main_config }}; then
          sed -i 's/^[#[:space:]]*UsePAM.*/UsePAM yes/' {{ sshd_main_config }}
        else
          echo 'UsePAM yes' >> {{ sshd_main_config }}
        fi

        if grep -qE '^[#[:space:]]*MaxAuthTries' {{ sshd_main_config }}; then
          sed -i 's/^[#[:space:]]*MaxAuthTries.*/MaxAuthTries 10/' {{ sshd_main_config }}
        else
          echo 'MaxAuthTries 10' >> {{ sshd_main_config }}
        fi

        sshd -t
      changed_when: true

    - name: Restart SSH service safely
      ansible.builtin.raw: |
        set -e

        if systemctl list-unit-files | grep -q '^sshd\.service'; then
          systemctl restart sshd
        elif systemctl list-unit-files | grep -q '^ssh\.service'; then
          systemctl restart ssh
        elif service sshd status >/dev/null 2>&1; then
          service sshd restart
        elif service ssh status >/dev/null 2>&1; then
          service ssh restart
        else
          echo "Could not determine SSH service name"
          exit 1
        fi
      changed_when: true

    - name: Validate final user and expiration state
      ansible.builtin.raw: |
        set -e

        for u in {{ lab_users | join(' ') }}; do
          echo "===== $u ====="
          id "$u"
          chage -l "$u" | egrep 'Account expires|Password expires|Maximum number'
        done
      register: final_user_check
      changed_when: false

    - name: Show final user validation
      ansible.builtin.debug:
        var: final_user_check.stdout_lines
